keybind = super+w=close_surface

# Splits
keybind = ctrl+semicolon>v=new_split:right
keybind = ctrl+semicolon>s=new_split:down

keybind = ctrl+semicolon>h=goto_split:previous
keybind = ctrl+semicolon>j=goto_split:down
keybind = ctrl+semicolon>k=goto_split:up
keybind = ctrl+semicolon>l=goto_split:next

keybind = ctrl+semicolon>enter=toggle_split_zoom

keybind = ctrl+semicolon>equal=equalize_splits
keybind = ctrl+semicolon>shift+h=resize_split:left,50
keybind = ctrl+semicolon>shift+j=resize_split:down,50
keybind = ctrl+semicolon>shift+k=resize_split:up,50
keybind = ctrl+semicolon>shift+l=resize_split:right,50

# Tabs
keybind = super+t=new_tab
keybind = ctrl+tab=next_tab
keybind = ctrl+shift+tab=previous_tab
keybind = super+physical:zero=last_tab
keybind = super+physical:one=goto_tab:1
keybind = super+physical:two=goto_tab:2
keybind = super+physical:three=goto_tab:3
keybind = super+physical:four=goto_tab:4
keybind = super+physical:five=goto_tab:5
keybind = super+physical:six=goto_tab:6
keybind = super+physical:seven=goto_tab:7
keybind = super+physical:eight=goto_tab:8
keybind = super+physical:nine=goto_tab:9

# Windows
keybind = super+n=new_window
keybind = super+shift+w=close_window
