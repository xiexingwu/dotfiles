# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift


start-at-login = true
after-login-command = [] # on user login
after-startup-command = [ # on aerospace startup
    'exec-and-forget borders'
] 

accordion-padding = 30
default-root-container-layout = 'tiles' # or accordion
default-root-container-orientation = 'auto' # horizontal/vertical for wide/tall displays

gaps.inner = { horizontal = 6, vertical = 6 }
gaps.outer = { top = 6, bottom = 6, left = 6, right = 6 }

# Float these apps by default
[[on-window-detected]]
if.app-name-regex-substring = '^(slack|wechat|discord|messages)$'
run = ['layout floating', 'move-node-to-workspace chat']
[[on-window-detected]]
if.window-title-regex-substring = '-scratch'
run = ['layout floating']

# forced workspace assignment
[workspace-to-monitor-force-assignment]
chat = ['^built-in retina display$', 'secondary']
personal = ['main', 2]
personal2 = [3, 'secondary']
work = ['main', 2]
work2 = [3, 'secondary']

# main bindings
[mode.main.binding]
# scratch terminal
cmd-f2 = 'exec-and-forget /opt/homebrew/bin/kitty --title=Kitty-scratch -d $HOME -o macos_quit_when_last_window_closed=yes zsh -i'


## Windows/nodes (alt[-modifier]-hjkl)
alt-semicolon = 'mode node'
# focus
alt-h = 'focus left --boundaries all-monitors-outer-frame --boundaries-action stop'
alt-j = 'focus down --boundaries all-monitors-outer-frame --boundaries-action stop'
alt-k = 'focus up --boundaries all-monitors-outer-frame --boundaries-action stop'
alt-l = 'focus right --boundaries all-monitors-outer-frame --boundaries-action stop'
# move within workspace
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'
# follow across workspaces
alt-ctrl-shift-h = ['move-node-to-workspace prev --wrap-around', 'workspace next --wrap-around']
alt-ctrl-shift-l = ['move-node-to-workspace next --wrap-around', 'workspace next --wrap-around']


## Workspaces (ctrl-alt[-modifier]-,.)
ctrl-alt-semicolon = 'mode workspace'
# swap/move
ctrl-alt-comma = 'workspace --wrap-around prev'
ctrl-alt-period = 'workspace --wrap-around next'
ctrl-alt-shift-comma = 'move-workspace-to-monitor --wrap-around prev'
ctrl-alt-shift-period = 'move-workspace-to-monitor --wrap-around next'


## Misc Modes
cmd-semicolon = 'mode service'


[mode.node.binding]
esc = 'mode main'
f = ['layout floating tiling', 'mode main'] # Toggle floating and unfloat
enter = ['fullscreen', 'mode main']
# dump to workspace
c = ['move-node-to-workspace chat', 'mode main']
p = ['move-node-to-workspace personal', 'mode main']
w = ['move-node-to-workspace work', 'mode main']
shift-p = ['move-node-to-workspace personal2', 'mode main']
shift-w = ['move-node-to-workspace work2', 'mode main']
# join/resize share the _node mode
j = 'mode _node' # join
r = 'mode _node' # resize


[mode._node.binding]
esc = 'mode main'
# resize
minus = 'resize smart -50'
equal = 'resize smart +50'
# join
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']


[mode.workspace.binding]
esc = 'mode main'
# swap layouts
t = ['layout tiles horizontal vertical', 'mode main']
a = ['layout accordion horizontal vertical', 'mode main']
# focus workspaces 
c = ['workspace chat', 'mode main']
p = ['workspace personal', 'workspace personal2', 'mode main']
w = ['workspace work', 'workspace work2', 'mode main']
# reset layout
shift-r = ['flatten-workspace-tree', 'mode main']


[mode.service.binding]
esc = 'mode main'
r = ['reload-config', 'mode main']
t = ['enable toggle', 'mode main']

